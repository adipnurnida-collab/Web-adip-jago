<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Felix Galaxy Lite</title>
<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle, #050510, #000000);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
}

/* bintang ringan */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 50px 50px;
  animation: move 20s linear infinite;
  opacity: 0.4;
}

@keyframes move {
  from { transform: translateY(0); }
  to { transform: translateY(-200px); }
}

/* teks */
h1 {
  font-size: 50px;
  animation: blink 2s infinite;
  z-index: 1;
}

/* kedip merah biru ringan */
@keyframes blink {
  0% { color: red; text-shadow: 0 0 10px red; }
  50% { color: blue; text-shadow: 0 0 10px blue; }
  100% { color: red; text-shadow: 0 0 10px red; }
}
</style>
</head>
<body>

<div class="stars"></div>
<h1>FELIX</h1>

</body>
</html>
