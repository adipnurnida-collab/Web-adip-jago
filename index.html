<!DOCTYPE html>
<html lang="id">

<meta charset="UTF-8">
<title>VS Bermuda</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at center, #05051a, #000);
  font-family: Arial, sans-serif;
}

/* bintang */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.25;
  animation: move 15s linear infinite;
}

@keyframes move {
  from { transform: translateY(0); }
  to { transform: translateY(-120px); }
}

/* teks tengah */
.text-box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
}
