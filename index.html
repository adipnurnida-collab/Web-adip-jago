<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Shooting Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: Arial;
}

canvas {
  display: block;
  margin: auto;
  background: #111;
  border: 2px solid white;
}

.info {
  position: fixed;
  top: 10px;
  width: 100%;
  text-align: center;
  color: white;
}
</style>
</head>
<body>

<div class="info">← → gerak | SPACE tembak</div>
<canvas id="game" width="300" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = { x: 130, y: 430, w: 40, h: 40 };
let bullets = [];
let enemies = [];
let keys = {};
let score = 0;

// kontrol
document.addEventListener("keydown", e => {
  keys[e.key] = true;

  if (e.code === "Space") {
    bullets.push({ x: player.x + 15, y: player.y, w: 5, h: 10 });
  }
});

document.addEventListener("keyup", e => keys[e.key] = false);

// enemy spawn
setInterval(() => {
  enemies.push({
    x: Math.random() * 260,
    y: -20,
    w: 30,
    h: 30
  });
}, 1000);

// update game
function update() {
  if (keys["ArrowLeft"] && player.x > 0) player.x -= 5;
  if (keys["ArrowRight"] && player.x < 260) player.x += 5;

  bullets.forEach(b => b.y -= 7);
  enemies.forEach(e => e.y += 2);

  // collision
