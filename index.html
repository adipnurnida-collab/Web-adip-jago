<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Suwardi</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    h1 {
      font-size: 60px;
      color: #fff;
      text-transform: uppercase;
      position: relative;
      letter-spacing: 5px;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      0% {
        text-shadow: 0 0 5px #00f, 0 0 10px #00f, 0 0 20px #00f;
      }
      100% {
        text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff;
      }
    }
  </style>
</head>
<body>
  <h1>Marsudi</h1>
</body>
</html>
