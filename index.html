<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Felix Galaxy</title>
<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle, #000010, #000000);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
}

/* bintang galaksi */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  background: transparent;
}
.stars::before,
.stars::after {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: transparent;
  box-shadow: 
    20px 30px white, 50px 80px white, 90px 120px white,
    200px 300px white, 400px 500px white, 600px 700px white;
  animation: moveStars 20s linear infinite;
}

@keyframes moveStars {
  from { transform: translateY(0); }
  to { transform: translateY(-1000px); }
}

/* teks */
h1 {
  font-size: 60px;
  text-transform: uppercase;
  letter-spacing: 5px;
  animation: blink 1s infinite alternate;
  z-index: 1;
}

/* kedip merah biru */
@keyframes blink {
  0% {
    color: red;
    text-shadow: 0 0 20px red, 0 0 40px blue;
  }
  50% {
    color: blue;
    text-shadow: 0 0 20px blue, 0 0 40px red;
  }
  100% {
    color: red;
    text-shadow: 0 0 30px red, 0 0 60px blue;
  }
}
</style>
</head>
<body>

<div class="stars"></div>
<h1>FELIX</h1>

</body>
</html>
